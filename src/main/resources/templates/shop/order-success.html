<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Success - Perfume Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #faf7f2;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }

        .success-card {
            max-width: 680px;
            margin: 80px auto;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,.07);
            padding: 40px 28px;
            text-align: center;
        }

        .success-icon {
            width: 84px;
            height: 84px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: #ecfdf5;
            color: #16a34a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .btn-gold {
            background-color: #c6a47e;
            border: none;
            color: #fff;
        }

        .btn-gold:hover {
            background-color: #b38b5f;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h2 class="mb-3">Order Placed Successfully</h2>
        <p class="text-muted mb-2">Thank you for shopping with Fragrance Haven.</p>
        <p class="mb-4">
            Your order ID is:
            <strong th:text="${orderId}">1</strong>
        </p>

        <div class="d-flex justify-content-center gap-2 flex-wrap">
            <a th:href="@{/perfume-shop}" class="btn btn-outline-secondary rounded-pill px-4">
                Continue Shopping
            </a>
            <a th:href="@{/perfume-shop/my-orders}" class="btn btn-gold rounded-pill px-4">
                My Orders
            </a>
        </div>
    </div>
</div>

</body>
</html>
