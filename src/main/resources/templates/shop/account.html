<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shop/layout-shop/layout}">
<head>
    <title>My Account - Perfume Shop</title>
    <link rel="stylesheet" th:href="@{/css/shop/account.css}">

</head>
<body>

<section layout:fragment="content">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card-soft p-4 p-md-5">

                    <div class="profile-top">
                        <div class="profile-avatar"
                             th:text="${customer.fullName != null and !#strings.isEmpty(customer.fullName) ? #strings.substring(customer.fullName,0,1) : 'U'}">
                            U
                        </div>

                        <div>
                            <h3 class="mb-1">My Account</h3>
                            <div class="text-muted" th:text="${customer.email}">customer@email.com</div>
                        </div>
                    </div>

                    <h4 class="section-title">Profile Information</h4>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/perfume-shop/account}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="label-soft">Full Name</div>
                                <input type="text" name="fullName" class="form-control"
                                       th:value="${customer.fullName}" placeholder="Enter full name">
                            </div>

                            <div class="col-md-6">
                                <div class="label-soft">Email</div>
                                <input type="email" class="form-control"
                                       th:value="${customer.email}" readonly>
                            </div>

                            <div class="col-md-6">
                                <div class="label-soft">Phone</div>
                                <input type="text" name="phone" class="form-control"
                                       th:value="${customer.phone}" placeholder="Enter phone number">
                            </div>

                            <div class="col-md-12">
                                <div class="label-soft">Address</div>
                                <textarea name="address" class="form-control" placeholder="Enter your address"
                                          th:text="${customer.address}"></textarea>
                            </div>
                        </div>

                        <div class="mt-4 d-flex justify-content-end">
                            <button type="submit" class="btn btn-gold">
                                Save Profile
                            </button>
                        </div>
                    </form>

                    <div class="divider-soft"></div>

                    <h4 class="section-title">Change Password</h4>

                    <div th:if="${passwordSuccessMessage}" class="alert alert-success" th:text="${passwordSuccessMessage}"></div>
                    <div th:if="${passwordErrorMessage}" class="alert alert-danger" th:text="${passwordErrorMessage}"></div>

                    <form th:action="@{/perfume-shop/account/change-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="row g-3">
                            <div class="col-md-12">
                                <div class="label-soft">Current Password</div>
                                <input type="password" name="currentPassword" class="form-control" placeholder="Enter current password">
                            </div>

                            <div class="col-md-6">
                                <div class="label-soft">New Password</div>
                                <input type="password" name="newPassword" class="form-control" placeholder="Enter new password">
                            </div>

                            <div class="col-md-6">
                                <div class="label-soft">Confirm New Password</div>
                                <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm new password">
                            </div>
                        </div>

                        <div class="mt-4 d-flex justify-content-end">
                            <button type="submit" class="btn btn-gold">
                                Change Password
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
