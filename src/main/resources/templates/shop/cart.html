<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Cart - Perfume Shop</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #faf7f2;
      color: #3e3e3e;
    }

    h1, h2, h3, h4, h5, h6, .navbar-brand {
      font-family: 'Playfair Display', serif;
    }

    .navbar-brand {
      color: #8b6e4b !important;
      font-weight: 700;
    }

    .btn-gold {
      background-color: #c6a47e;
      border: none;
      color: #fff;
    }

    .btn-gold:hover {
      background-color: #b38b5f;
      color: #fff;
    }

    .btn-outline-gold {
      border: 1px solid #c6a47e;
      color: #c6a47e;
      background: transparent;
    }

    .btn-outline-gold:hover {
      background-color: #c6a47e;
      color: white;
    }

    .cart-card {
      border: none;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }

    .cart-img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 14px;
      background: #f3f4f6;
    }

    .summary-box {
      border: none;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }

    .qty-box {
      display: inline-flex;
      align-items: center;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .qty-btn {
      width: 38px;
      height: 38px;
      border: 0;
      background: #f8fafc;
      font-weight: 700;
    }

    .qty-input {
      width: 56px;
      height: 38px;
      border: 0;
      text-align: center;
      outline: none;
    }

    .empty-state {
      padding: 48px 20px;
      text-align: center;
      color: #6b7280;
    }

    .empty-state i {
      font-size: 54px;
      color: #d1d5db;
      margin-bottom: 12px;
    }

    .cart-row {
      transition: all .2s ease;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white py-3 shadow-sm">
  <div class="container">
    <a class="navbar-brand fs-3" th:href="@{/perfume-shop}">
      Fragrance Haven
    </a>

    <div class="ms-auto d-flex align-items-center gap-2">
      <a th:href="@{/perfume-shop}" class="btn btn-outline-secondary rounded-pill">
        Continue Shopping
      </a>

      <a th:href="@{/perfume-shop/cart}" class="btn btn-light position-relative rounded-circle p-2">
        <i class="bi bi-cart3 fs-5"></i>
        <span id="cartCountBadge"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark"
              style="font-size: 0.7rem;"
              th:text="${cartCount}">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container my-5">
  <h2 class="mb-4">Your Cart</h2>

  <div class="row g-4">
    <div class="col-lg-8">
      <div class="cart-card p-4">
        <div id="cartItemsWrap">
          <div th:if="${#lists.isEmpty(items)}" class="empty-state" id="emptyCartState">
            <i class="bi bi-cart-x"></i>
            <h5 class="mb-2">Your cart is empty</h5>
            <p class="mb-3">Add some perfumes and come back here.</p>
            <a th:href="@{/perfume-shop}" class="btn btn-gold rounded-pill px-4">Shop Now</a>
          </div>

          <div th:if="${!#lists.isEmpty(items)}" id="cartList">
            <div class="border-bottom py-3 cart-row"
                 th:each="item : ${items}"
                 th:attr="data-product-id=${item.productId}"
                 th:id="'cart-row-' + ${item.productId}">
              <div class="row align-items-center g-3">
                <div class="col-md-2 col-4">
                  <img th:src="${item.image != null and !#strings.isEmpty(item.image) ? item.image : '/images/no-image.png'}"
                       class="cart-img"
                       alt="product">
                </div>

                <div class="col-md-4 col-8">
                  <h6 class="mb-1" th:text="${item.name}">Product Name</h6>
                  <div class="text-muted small" th:text="${item.size}">100ml</div>
                  <div class="fw-semibold mt-1"
                       th:text="'$' + ${#numbers.formatDecimal(item.unitPrice,1,'COMMA',2,'POINT')}">$0.00</div>
                </div>

                <div class="col-md-3 col-6">
                  <div class="qty-box">
                    <button type="button"
                            class="qty-btn btn-dec"
                            th:attr="data-id=${item.productId}">
                      -
                    </button>

                    <input type="number"
                           class="qty-input"
                           min="1"
                           th:max="${item.stock}"
                           th:value="${item.qty}"
                           th:attr="data-id=${item.productId},data-stock=${item.stock}">

                    <button type="button"
                            class="qty-btn btn-inc"
                            th:attr="data-id=${item.productId},data-stock=${item.stock}">
                      +
                    </button>
                  </div>
                </div>

                <div class="col-md-2 col-3 text-md-end">
                  <div class="fw-bold line-total"
                       th:id="'line-total-' + ${item.productId}"
                       th:text="'$' + ${#numbers.formatDecimal(item.lineTotal,1,'COMMA',2,'POINT')}">$0.00</div>
                </div>

                <div class="col-md-1 col-3 text-end">
                  <button type="button"
                          class="btn btn-sm btn-outline-danger btn-remove"
                          th:attr="data-id=${item.productId}">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>
            </div>

            <div class="mt-3">
              <button type="button" id="btnClearCart" class="btn btn-outline-danger">
                Clear Cart
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="summary-box p-4">
        <h5 class="mb-3">Order Summary</h5>

        <div class="d-flex justify-content-between mb-2">
          <span>Items</span>
          <span id="summaryCartCount" th:text="${cartCount}">0</span>
        </div>

        <div class="d-flex justify-content-between mb-3">
          <span>Subtotal</span>
          <strong id="summarySubtotal"
                  th:text="'$' + ${#numbers.formatDecimal(subtotal,1,'COMMA',2,'POINT')}">$0.00</strong>
        </div>

        <hr>

        <button class="btn btn-gold w-100" type="button" disabled>
          Checkout (next step)
        </button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  window.shopCartConfig = {
    csrfToken: [[${_csrf.token}]],
    csrfHeader: [[${_csrf.headerName}]]
  };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/shop/cart.js}"></script>

</body>
</html>
