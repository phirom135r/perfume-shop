<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shop/layout-shop/layout}">
<head>
  <title>Cart - Perfume Shop</title>
  <link rel="stylesheet" th:href="@{/css/shop/cart.css}">
</head>
<body>

<section layout:fragment="content">
  <div class="container my-5">
    <h2 class="mb-4">Your Cart</h2>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="cart-card p-4">
          <div id="cartItemsWrap">
            <div th:if="${#lists.isEmpty(items)}" class="empty-state" id="emptyCartState">
              <i class="bi bi-cart-x"></i>
              <h5 class="mb-2">Your cart is empty</h5>
              <p class="mb-3">Add some perfumes and come back here.</p>
              <a th:href="@{/perfume-shop/shop}" class="btn btn-gold rounded-pill px-4">Shop Now</a>
            </div>

            <div th:if="${!#lists.isEmpty(items)}" id="cartList">
              <div class="border-bottom py-3 cart-row"
                   th:each="item : ${items}"
                   th:attr="data-product-id=${item.productId}"
                   th:id="'cart-row-' + ${item.productId}">
                <div class="row align-items-center g-3">
                  <div class="col-md-2 col-4">
                    <img th:src="${item.image != null and !#strings.isEmpty(item.image) ? item.image : '/images/no-image.png'}"
                         class="cart-img"
                         alt="product">
                  </div>

                  <div class="col-md-4 col-8">
                    <h6 class="mb-1" th:text="${item.name}">Product Name</h6>
                    <div class="text-muted small" th:text="${item.size}">100ml</div>

                    <div th:if="${item.originalPrice > item.unitPrice}"
                         class="old-price"
                         th:id="'old-price-' + ${item.productId}"
                         th:text="'$' + ${#numbers.formatDecimal(item.originalPrice,1,'COMMA',2,'POINT')}">$0.00</div>

                    <div class="fw-semibold mt-1"
                         th:id="'unit-price-' + ${item.productId}"
                         th:text="'$' + ${#numbers.formatDecimal(item.unitPrice,1,'COMMA',2,'POINT')}">$0.00</div>

                    <div th:if="${item.lineDiscount > 0}"
                         class="save-price"
                         th:id="'save-price-' + ${item.productId}"
                         th:text="'Save $' + ${#numbers.formatDecimal(item.lineDiscount,1,'COMMA',2,'POINT')}">Save $0.00</div>
                  </div>

                  <div class="col-md-3 col-6">
                    <div class="qty-box">
                      <button type="button"
                              class="qty-btn btn-dec"
                              th:attr="data-id=${item.productId}">
                        -
                      </button>

                      <input type="number"
                             class="qty-input"
                             min="1"
                             th:max="${item.stock}"
                             th:value="${item.qty}"
                             th:attr="data-id=${item.productId},data-stock=${item.stock}">

                      <button type="button"
                              class="qty-btn btn-inc"
                              th:attr="data-id=${item.productId},data-stock=${item.stock}">
                        +
                      </button>
                    </div>
                  </div>

                  <div class="col-md-2 col-3 text-md-end">
                    <div class="fw-bold line-total"
                         th:id="'line-total-' + ${item.productId}"
                         th:text="'$' + ${#numbers.formatDecimal(item.lineTotal,1,'COMMA',2,'POINT')}">$0.00</div>
                  </div>

                  <div class="col-md-1 col-3 text-end">
                    <button type="button"
                            class="btn btn-sm btn-outline-danger btn-remove"
                            th:attr="data-id=${item.productId}">
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </div>
              </div>

              <div class="mt-3">
                <button type="button" id="btnClearCart" class="btn btn-outline-danger">
                  Clear Cart
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="summary-box p-4">
          <h5 class="mb-3">Order Summary</h5>

          <div class="d-flex justify-content-between mb-2">
            <span>Items</span>
            <span id="summaryCartCount" th:text="${cartCount}">0</span>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal</span>
            <span id="summarySubtotal"
                  th:text="'$' + ${#numbers.formatDecimal(subtotal,1,'COMMA',2,'POINT')}">$0.00</span>
          </div>

          <div class="d-flex justify-content-between mb-2 text-danger">
            <span>Discount</span>
            <span id="summaryDiscount"
                  th:text="'-$' + ${#numbers.formatDecimal(discount,1,'COMMA',2,'POINT')}">-$0.00</span>
          </div>

          <hr>

          <div class="d-flex justify-content-between fs-5 fw-bold">
            <span>Total</span>
            <span id="summaryTotal"
                  th:text="'$' + ${#numbers.formatDecimal(total,1,'COMMA',2,'POINT')}">$0.00</span>
          </div>

          <hr>

          <a th:href="@{/perfume-shop/checkout}" class="btn btn-gold w-100">
            Proceed to Checkout
          </a>
        </div>
      </div>
    </div>
  </div>
</section>

<th:block layout:fragment="pageScripts">
  <script th:inline="javascript">
    window.shopCartConfig = {
      csrfToken: [[${_csrf.token}]],
      csrfHeader: [[${_csrf.headerName}]]
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script th:src="@{/js/shop/cart.js}"></script>
</th:block>

</body>
</html>
