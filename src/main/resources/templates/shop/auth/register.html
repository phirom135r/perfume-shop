<!--shop/auth/register.html-->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Perfume Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins',sans-serif;
            background: linear-gradient(135deg, #f8f2ea, #f3e4d2);
            min-height:100vh;
        }
        .auth-wrap{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }
        .auth-card{
            width:100%;
            max-width:980px;
            background:#fff;
            border-radius:28px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,.08);
        }
        .auth-left{
            background: linear-gradient(135deg, #c6a47e, #8b6e4b);
            color:#fff;
            padding:48px;
            min-height:100%;
        }
        .auth-left h2{
            font-family:'Playfair Display',serif;
            font-size:40px;
            font-weight:700;
        }
        .auth-right{
            padding:42px 36px;
        }
        .brand-title{
            font-family:'Playfair Display',serif;
            font-weight:700;
            color:#8b6e4b;
        }
        .btn-gold{
            background:#c6a47e;
            border:none;
            color:#fff;
            font-weight:600;
            border-radius:14px;
            height:48px;
        }
        .btn-gold:hover{
            background:#b38b5f;
            color:#fff;
        }
        .form-control{
            border-radius:14px;
            height:46px;
        }
    </style>
</head>
<body>

<div class="auth-wrap">
    <div class="auth-card row g-0">
        <div class="col-lg-5 d-none d-lg-block">
            <div class="auth-left h-100">
                <h2>Create Account</h2>
                <p class="mt-3 mb-0">
                    Join Fragrance Haven and start exploring luxury scents made for you.
                </p>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="auth-right">
                <div class="mb-4">
                    <h3 class="brand-title mb-1">Fragrance Haven</h3>
                    <div class="text-muted">Create your customer account</div>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form th:action="@{/perfume-shop/auth/register}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="fullName" class="form-control"
                                   th:value="${fullName}" placeholder="Enter full name" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control"
                                   th:value="${email}" placeholder="Enter email" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control"
                                   th:value="${phone}" placeholder="Enter phone">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Enter password" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirmPassword" class="form-control"
                                   placeholder="Confirm password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-gold w-100 mt-4">Register</button>
                    <div class="text-center my-3 text-muted">or continue with</div>

                    <a href="/oauth2/authorization/google" class="btn btn-outline-dark w-100" style="border-radius:14px;height:48px;line-height:32px;">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                             alt="Google"
                             style="width:18px;height:18px;margin-right:8px;">
                        Register with Google
                    </a>
                </form>

                <div class="text-center mt-4">
                    Already have an account?
                    <a th:href="@{/perfume-shop/auth/login}" class="text-decoration-none">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
