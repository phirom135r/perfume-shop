<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Perfume Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins',sans-serif;
            background:#faf7f2;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        h1,h2,h3,h4,h5,h6{
            font-family:'Playfair Display',serif;
        }
        .auth-card{
            width:100%;
            max-width:460px;
            border:none;
            border-radius:24px;
            box-shadow:0 12px 30px rgba(0,0,0,.08);
        }
        .btn-gold{
            background:#c6a47e;
            color:#fff;
            border:none;
            border-radius:999px;
            min-height:46px;
        }
        .btn-gold:hover{
            background:#b38b5f;
            color:#fff;
        }
        .form-control{
            min-height:48px;
            border-radius:14px;
        }
    </style>
</head>
<body>

<div class="card auth-card p-4 p-md-5 bg-white">
    <h3 class="mb-2 text-center">Reset Password</h3>
    <p class="text-muted text-center mb-4">Enter your new password below.</p>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/perfume-shop/auth/reset-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="token" th:value="${token}">

        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="newPassword" class="form-control" placeholder="Enter new password" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm new password" required>
        </div>

        <button type="submit" class="btn btn-gold w-100">Reset Password</button>
    </form>
</div>

</body>
</html>
