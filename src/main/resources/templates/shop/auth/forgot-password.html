<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Perfume Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins',sans-serif;
            background:#faf7f2;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        h1,h2,h3,h4,h5,h6{
            font-family:'Playfair Display',serif;
        }

        .auth-card{
            width:100%;
            max-width:460px;
            border:none;
            border-radius:24px;
            box-shadow:0 12px 30px rgba(0,0,0,.08);
        }

        .btn-gold{
            background:#c6a47e;
            color:#fff;
            border:none;
            border-radius:999px;
            min-height:46px;
            font-weight:600;
        }

        .btn-gold:hover{
            background:#b38b5f;
            color:#fff;
        }

        .form-control{
            min-height:48px;
            border-radius:14px;
        }

        .msg-box{
            display:none;
            border-radius:14px;
            padding:14px 16px;
            font-size:15px;
            margin-bottom:18px;
        }

        .msg-success{
            background:#eaf7ea;
            color:#256c2f;
            border:1px solid #cfe9cf;
        }

        .msg-error{
            background:#fdecec;
            color:#b42318;
            border:1px solid #f5c2c7;
        }
    </style>
</head>
<body>

<div class="card auth-card p-4 p-md-5 bg-white">
    <h3 class="mb-2 text-center">Forgot Password</h3>
    <p class="text-muted text-center mb-4">Enter your email to receive a reset link.</p>

    <div id="successBox" class="msg-box msg-success"></div>
    <div id="errorBox" class="msg-box msg-error"></div>

    <form id="forgotPasswordForm">
        <input type="hidden" id="csrfToken" th:value="${_csrf.token}">
        <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}">

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email"
                   id="email"
                   class="form-control"
                   placeholder="Enter your email"
                   required>
        </div>

        <button type="submit" class="btn btn-gold w-100" id="btnSubmit">
            Send Reset Link
        </button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/perfume-shop/auth/login}" class="text-decoration-none">Back to Login</a>
    </div>
</div>

<script>
    const form = document.getElementById("forgotPasswordForm");
    const emailInput = document.getElementById("email");
    const btnSubmit = document.getElementById("btnSubmit");
    const csrfToken = document.getElementById("csrfToken").value;
    const csrfHeader = document.getElementById("csrfHeader").value;

    const successBox = document.getElementById("successBox");
    const errorBox = document.getElementById("errorBox");

    function hideMessages() {
        successBox.style.display = "none";
        errorBox.style.display = "none";
        successBox.textContent = "";
        errorBox.textContent = "";
    }

    function showSuccess(message) {
        successBox.textContent = message;
        successBox.style.display = "block";
        errorBox.style.display = "none";
    }

    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = "block";
        successBox.style.display = "none";
    }

    form.addEventListener("submit", async function (e) {
        e.preventDefault();
        hideMessages();

        const email = emailInput.value.trim();
        if (!email) return;

        btnSubmit.disabled = true;
        btnSubmit.textContent = "Sending...";

        try {
            const body = new URLSearchParams();
            body.append("email", email);

            const res = await fetch("/perfume-shop/auth/forgot-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "Accept": "application/json",
                    [csrfHeader]: csrfToken
                },
                body: body.toString()
            });

            const json = await res.json();

            if (!res.ok || !json.ok) {
                throw new Error(json.message || "Cannot send reset link");
            }

            showSuccess(json.message || "Reset link has been sent to your email.");
            emailInput.value = "";

        } catch (err) {
            showError(err.message || "Cannot send reset link");
        } finally {
            btnSubmit.disabled = false;
            btnSubmit.textContent = "Send Reset Link";
        }
    });
</script>

</body>
</html>
