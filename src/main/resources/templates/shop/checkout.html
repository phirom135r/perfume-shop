<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Perfume Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #faf7f2;
            color: #3e3e3e;
        }

        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'Playfair Display', serif;
        }

        .navbar-brand {
            color: #8b6e4b !important;
            font-weight: 700;
        }

        .card-soft {
            border: none;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,.06);
        }

        .btn-gold {
            background-color: #c6a47e;
            border: none;
            color: #fff;
        }

        .btn-gold:hover {
            background-color: #b38b5f;
            color: #fff;
        }

        .product-thumb {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            object-fit: cover;
            background: #f3f4f6;
        }

        .form-control, .form-select {
            border-radius: 12px;
            min-height: 46px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white py-3 shadow-sm">
    <div class="container">
        <a class="navbar-brand fs-3" th:href="@{/perfume-shop}">Fragrance Haven</a>

        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/perfume-shop/cart}" class="btn btn-outline-secondary rounded-pill">
                Back to Cart
            </a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h2 class="mb-4">Checkout</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/perfume-shop/checkout}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card-soft p-4">
                    <h5 class="mb-3">Shipping Information</h5>

                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" th:field="*{fullName}" placeholder="Enter full name">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" class="form-control" th:field="*{phone}" placeholder="Enter phone">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="Enter email">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" rows="4" th:field="*{address}" placeholder="Enter full address"></textarea>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label">Payment Method</label>
                            <select class="form-select" th:field="*{paymentMethod}">
                                <option value="CASH">Cash on Delivery</option>
                                <option value="KHQR">KHQR</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card-soft p-4">
                    <h5 class="mb-3">Order Summary</h5>

                    <div class="d-flex align-items-center gap-3 mb-3 pb-3 border-bottom"
                         th:each="item : ${items}">
                        <img th:src="${item.image != null and !#strings.isEmpty(item.image) ? item.image : '/images/no-image.png'}"
                             class="product-thumb"
                             alt="product">

                        <div class="flex-grow-1">
                            <div class="fw-semibold" th:text="${item.name}">Product Name</div>
                            <div class="text-muted small">
                                <span th:text="${item.size}">100ml</span>
                                ×
                                <span th:text="${item.qty}">1</span>
                            </div>
                        </div>

                        <div class="fw-semibold"
                             th:text="'$' + ${#numbers.formatDecimal(item.lineTotal,1,'COMMA',2,'POINT')}">
                            $0.00
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mb-2">
                        <span>Items</span>
                        <span th:text="${cartCount}">0</span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Subtotal</span>
                        <strong th:text="'$' + ${#numbers.formatDecimal(subtotal,1,'COMMA',2,'POINT')}">$0.00</strong>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between fs-5 mb-4">
                        <strong>Total</strong>
                        <strong th:text="'$' + ${#numbers.formatDecimal(subtotal,1,'COMMA',2,'POINT')}">$0.00</strong>
                    </div>

                    <button type="submit" class="btn btn-gold w-100">
                        Place Order
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

</body>
</html>
