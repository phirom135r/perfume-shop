<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Perfume Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: #f7f7f7;
            font-family: Arial, sans-serif;
        }

        .checkout-card,
        .order-summary {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, .05);
        }

        .khqr-modal .modal-content {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .khqr-box {
            border: 2px solid #f1b0b0;
            border-radius: 18px;
            padding: 12px;
            display: inline-block;
            background: #fff;
        }

        #khqrCanvas canvas {
            display: block;
            margin: 0 auto;
        }

        .countdown-text {
            color: #999;
            font-size: 14px;
        }

        .status-text {
            color: #666;
            font-size: 15px;
        }

        .product-line {
            font-weight: 600;
        }

        .product-sub {
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row g-4">

        <div class="col-lg-7">
            <div class="checkout-card">
                <h4 class="mb-4">Billing Information</h4>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form id="checkoutForm" method="post" th:object="${form}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="text"
                               class="form-control"
                               th:value="${customerEmail}"
                               readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{fullName}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{phone}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control"
                                  rows="3"
                                  th:field="*{address}"
                                  required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Payment Method</label>
                        <select class="form-select" th:field="*{paymentMethod}">
                            <option value="CASH">Cash</option>
                            <option value="KHQR">KHQR (ABA / Bakong)</option>
                        </select>
                    </div>

                    <button type="submit" id="btnPlaceOrder" class="btn btn-dark w-100">
                        Place Order
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="order-summary">
                <h5 class="mb-4">Order Summary</h5>

                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Product</th>
                        <th class="text-center">Qty</th>
                        <th class="text-end">Price</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="i : ${items}">
                        <td>
                            <div class="product-line" th:text="${i.name}">Product</div>
                            <div class="product-sub" th:text="${i.size != null ? i.size : 'N/A'}">100ml</div>
                        </td>
                        <td class="text-center" th:text="${i.qty}">1</td>
                        <td class="text-end">
                            $<span th:text="${#numbers.formatDecimal(i.unitPrice,1,'COMMA',2,'POINT')}">0.00</span>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <hr>

                <div class="d-flex justify-content-between">
                    <strong>Subtotal</strong>
                    <strong>
                        $<span th:text="${#numbers.formatDecimal(subtotal,1,'COMMA',2,'POINT')}">0.00</span>
                    </strong>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- KHQR Modal -->
<div class="modal fade khqr-modal" id="khqrModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close ms-auto" id="btnCloseKhqr"></button>
            </div>

            <div class="modal-body text-center px-4 pt-0 pb-4">
                <h3 class="mb-2">Scan to Pay (KHQR)</h3>
                <div class="fs-5 fw-semibold mb-3">$<span id="khqrTotal">0.00</span></div>

                <div class="khqr-box mb-3">
                    <div id="khqrCanvas"></div>
                </div>

                <div class="countdown-text mb-2">
                    Time left: <span id="countdown">03:00</span>
                </div>

                <div class="status-text mb-3" id="paymentStatusText">
                    Waiting for payment...
                </div>

                <button type="button" class="btn btn-danger w-100" id="btnCancelPayment">
                    Cancel Payment
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    (() => {
        const checkoutForm = document.getElementById("checkoutForm");
        const btnPlaceOrder = document.getElementById("btnPlaceOrder");
        const csrfInput = checkoutForm.querySelector('input[name="_csrf"]');

        const khqrModalEl = document.getElementById("khqrModal");
        const khqrModal = new bootstrap.Modal(khqrModalEl, {
            backdrop: "static",
            keyboard: false
        });

        const khqrCanvasBox = document.getElementById("khqrCanvas");
        const khqrTotal = document.getElementById("khqrTotal");
        const countdownEl = document.getElementById("countdown");
        const paymentStatusText = document.getElementById("paymentStatusText");
        const btnCancelPayment = document.getElementById("btnCancelPayment");
        const btnCloseKhqr = document.getElementById("btnCloseKhqr");

        let currentMd5 = null;
        let currentOrderId = null;
        let pollTimer = null;
        let countdownTimer = null;
        let secondsLeft = 180;

        function toastSuccess(title) {
            Swal.fire({
                toast: true,
                position: "top-end",
                icon: "success",
                title,
                showConfirmButton: false,
                timer: 1400,
                timerProgressBar: true
            });
        }

        function toastError(title) {
            Swal.fire({
                toast: true,
                position: "top-end",
                icon: "error",
                title,
                showConfirmButton: false,
                timer: 2200,
                timerProgressBar: true
            });
        }

        function setLoading(isLoading) {
            btnPlaceOrder.disabled = isLoading;
            btnPlaceOrder.textContent = isLoading ? "Processing..." : "Place Order";
        }

        function clearTimers() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
        }

        function formatTime(totalSeconds) {
            const min = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
            const sec = String(totalSeconds % 60).padStart(2, "0");
            return `${min}:${sec}`;
        }

        function startCountdown() {
            secondsLeft = 180;
            countdownEl.textContent = formatTime(secondsLeft);

            countdownTimer = setInterval(async () => {
                secondsLeft--;
                countdownEl.textContent = formatTime(secondsLeft);

                if (secondsLeft <= 0) {
                    clearTimers();
                    paymentStatusText.textContent = "Payment expired.";

                    if (currentMd5) {
                        await cancelPayment(false);
                    }
                }
            }, 1000);
        }

        async function openKhqrModal(orderId, total, khqrString, md5) {
            currentOrderId = orderId;
            currentMd5 = md5;

            khqrTotal.textContent = Number(total || 0).toFixed(2);
            paymentStatusText.textContent = "Waiting for payment...";
            khqrCanvasBox.innerHTML = "";

            await QRCode.toCanvas(khqrString, { width: 260 }, function (err, canvas) {
                if (err) throw err;
                khqrCanvasBox.appendChild(canvas);
            });

            khqrModal.show();
            startCountdown();
            pollTimer = setInterval(verifyPayment, 5000);
        }

        async function verifyPayment() {
            if (!currentMd5) return;

            try {
                const res = await fetch(`/perfume-shop/api/payment/verify?md5=${encodeURIComponent(currentMd5)}`, {
                    headers: { "Accept": "application/json" }
                });

                const json = await res.json();
                const status = String(json.status || "").toUpperCase();

                if (status === "PAID") {
                    clearTimers();
                    paymentStatusText.textContent = "Payment confirmed.";
                    khqrModal.hide();

                    await Swal.fire({
                        icon: "success",
                        title: "Payment Successful",
                        text: "Your payment has been confirmed."
                    });

                    window.location.href = `/perfume-shop/checkout/success?orderId=${json.orderId || currentOrderId}`;
                } else if (status === "CANCELLED") {
                    clearTimers();
                    khqrModal.hide();
                    toastError("Payment cancelled");
                    window.location.href = "/perfume-shop/cart";
                } else if (status === "OUT_OF_STOCK") {
                    clearTimers();
                    paymentStatusText.textContent = "Out of stock.";
                    await Swal.fire("Out of stock", "Some products are no longer available.", "error");
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function cancelPayment(showConfirm = true) {
            if (!currentMd5) return;

            if (showConfirm) {
                const ok = await Swal.fire({
                    title: "Cancel payment?",
                    text: "This order will be cancelled.",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonText: "Yes, cancel"
                });

                if (!ok.isConfirmed) return;
            }

            try {
                const res = await fetch(`/perfume-shop/api/payment/cancel?md5=${encodeURIComponent(currentMd5)}`, {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "X-CSRF-TOKEN": csrfInput ? csrfInput.value : ""
                    }
                });

                const json = await res.json();
                const status = String(json.status || "").toUpperCase();

                clearTimers();
                khqrModal.hide();

                if (status === "CANCELLED") {
                    toastSuccess("Payment cancelled");
                    window.location.href = "/perfume-shop/cart";
                } else if (status === "PAID") {
                    window.location.href = `/perfume-shop/checkout/success?orderId=${currentOrderId}`;
                } else {
                    toastError("Cannot cancel payment");
                }
            } catch (e) {
                console.error(e);
                toastError("Cannot cancel payment");
            }
        }

        checkoutForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            setLoading(true);

            try {
                const fd = new FormData(checkoutForm);

                const res = await fetch("/perfume-shop/checkout", {
                    method: "POST",
                    body: fd,
                    headers: {
                        "Accept": "application/json",
                        "X-CSRF-TOKEN": csrfInput ? csrfInput.value : ""
                    }
                });

                const json = await res.json();

                if (!res.ok || !json.ok) {
                    throw new Error(json.message || "Checkout failed");
                }

                const paymentMethod = String(json.paymentMethod || "CASH").toUpperCase();

                if (paymentMethod === "KHQR") {
                    await openKhqrModal(
                        json.orderId,
                        json.total,
                        json.khqrString,
                        json.md5
                    );
                } else {
                    toastSuccess("Order placed successfully");
                    window.location.href = `/perfume-shop/checkout/success?orderId=${json.orderId}`;
                }
            } catch (err) {
                console.error(err);
                toastError(err.message || "Checkout failed");
            } finally {
                setLoading(false);
            }
        });

        btnCancelPayment.addEventListener("click", () => cancelPayment(true));
        btnCloseKhqr.addEventListener("click", () => cancelPayment(true));
    })();
</script>

</body>
</html>
