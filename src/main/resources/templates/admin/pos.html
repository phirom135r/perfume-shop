<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
  <link rel="stylesheet" th:href="@{/css/admin/pos.css}">
</head>
<body>
<div class="container-fluid py-3" layout:fragment="content">

  <div class="row g-3">
    <!-- LEFT -->
    <div class="col-12 col-xl-8">
      <div class="pos-shell p-3">

        <!-- Toolbar -->
        <div class="pos-toolbar">
          <div class="toolbar-title-wrap">
            <h5 class="pos-title">POS</h5>
            <div class="pos-subtitle">Fast product search and checkout</div>
          </div>

          <div class="toolbar-controls">
            <div class="pos-search-wrap">
              <span class="pos-search-icon">🔎</span>
              <input id="q"
                     class="form-control pos-search"
                     placeholder="Search products by name, brand...">
            </div>

            <select id="categoryFilter" class="form-select pos-select">
              <option value="">All Categories</option>
            </select>

            <select id="brandFilter" class="form-select pos-select">
              <option value="">All Brands</option>
            </select>

            <button class="btn btn-primary pos-btn" id="btnSearch" type="button">Search</button>
            <button class="btn btn-outline-secondary pos-btn" id="btnReset" type="button">Reset</button>
          </div>
        </div>

        <!-- Products -->
        <div id="productsGrid" class="row g-3 pos-grid mt-2"></div>

        <!-- Footer -->
        <div class="pos-footer">
          <button class="btn btn-outline-secondary pager-btn" id="prevBtn" type="button">← Prev</button>
          <div class="small text-muted fw-semibold" id="pageInfo">Page 1</div>
          <button class="btn btn-outline-secondary pager-btn" id="nextBtn" type="button">Next →</button>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="col-12 col-xl-4">
      <div class="card card-soft sticky-col">
        <div class="card-header cart-header">
          <span class="fw-bold">Shopping Cart</span>
        </div>

        <div class="card-body">
          <div id="cartList" class="vstack gap-2"></div>

          <hr>

          <div class="summary-line">
            <span class="text-muted">Subtotal</span>
            <span class="fw-semibold">$<span id="subtotal">0.00</span></span>
          </div>

          <div class="summary-line">
            <span class="text-muted">Product Discount</span>
            <span class="fw-semibold text-danger">- $<span id="productDiscountShow">0.00</span></span>
          </div>

          <div class="summary-line">
            <span class="text-muted">Extra Discount</span>
            <span class="fw-semibold text-danger">- $<span id="discountShow">0.00</span></span>
          </div>

          <div class="summary-total">
            <span>Total</span>
            <span class="text-primary">$<span id="total">0.00</span></span>
          </div>

          <hr>

          <div class="mb-2">
            <label class="form-label">Customer Name <span class="text-danger">*</span></label>
            <input id="customerName" class="form-control" placeholder="Enter customer name">
          </div>

          <div class="mb-2">
            <label class="form-label">Phone</label>
            <input id="phone" class="form-control" placeholder="Enter phone number">
          </div>

          <div class="mb-2">
            <label class="form-label">Address</label>
            <input id="address" class="form-control" placeholder="Enter address">
          </div>

          <div class="mb-2">
            <label class="form-label">Extra Discount ($)</label>
            <input id="extraDiscount" class="form-control" value="0">
          </div>

          <div class="mb-3">
            <label class="form-label">Payment Method</label>
            <select id="paymentMethod" class="form-select">
              <option value="CASH">CASH</option>
              <option value="KHQR">KHQR</option>
            </select>
          </div>

          <button id="btnComplete" class="btn btn-success w-100 fw-bold" type="button">✅ Complete Order</button>
          <button id="btnClear" class="btn btn-outline-danger w-100 mt-2" type="button">🗑 Clear Cart</button>
        </div>
      </div>
    </div>
  </div>

  <!-- KHQR Modal -->
  <div class="modal fade" id="khqrModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content khqr-modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title">Scan to Pay (KHQR)</h5>
          <button type="button" class="btn-close btnCancelKhqr"></button>
        </div>
        <div class="modal-body text-center pt-0">
          <div class="fw-bold fs-5 mb-3">$<span id="khqrAmount">0.00</span></div>

          <div class="khqr-box mx-auto mb-3">
            <div id="khqrQrBox"></div>
          </div>

          <div class="small text-muted mb-2">
            Time left: <span id="khqrTimeLeft" class="fw-semibold">03:00</span>
          </div>

          <div id="khqrHint" class="text-muted mt-2 text-center">Waiting for payment...</div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-danger w-100 btnCancelKhqr">Cancel Payment</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script th:src="@{/js/admin/pos.js}"></script>
</div>
</body>
</html>
