<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
    <title>Orders</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables + Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css"/>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        #tblOrders thead th{
            background-color:#3b5bdb;
            color:#fff;
            border-bottom:none;
            white-space:nowrap;
        }

        #tblOrders{
            width:100% !important;
        }

        #tblOrders td, #tblOrders th{
            vertical-align:middle;
        }

        .pay-pill{
            display:inline-block;
            padding:.25rem .7rem;
            border-radius:999px;
            font-size:.78rem;
            font-weight:700;
            color:#fff;
            line-height:1;
        }
        .pay-cash{ background:#06b6d4; }
        .pay-khqr{ background:#2563eb; }

        .order-status-select{
            height:36px;
            min-width:170px;
            border-radius:12px;
            font-weight:600;
            border:1px solid #e5e7eb;
            box-shadow:none !important;
        }
        .order-status-select:focus{
            border-color:#cbd5e1;
        }

        .os-paid{
            background:#ecfdf5 !important;
            border-color:#bbf7d0 !important;
            color:#065f46 !important;
        }
        .os-pending{
            background:#fffbeb !important;
            border-color:#fde68a !important;
            color:#92400e !important;
        }
        .os-cancelled{
            background:#fef2f2 !important;
            border-color:#fecaca !important;
            color:#991b1b !important;
        }

        .btn-view{
            white-space:nowrap;
        }

        .order-detail-label{
            font-weight:700;
        }
    </style>
</head>

<body>
<div class="container-fluid py-3" layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Order Management</h3>
    </div>

    <div class="card shadow-sm">
        <div class="card-body table-responsive">
            <table id="tblOrders" class="table table-hover align-middle w-100">
                <thead>
                <tr>
                    <th>Order #</th>
                    <th>Customer</th>
                    <th>Phone</th>
                    <th>Items</th>
                    <th>Amount</th>
                    <th>Payment</th>
                    <th>Order Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
                </thead>
            </table>
        </div>
    </div>

    <!-- ===================== Order Details Modal ===================== -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content" style="border-radius:16px;">
                <div class="modal-header">
                    <h5 class="modal-title">Order Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <div><span class="order-detail-label">Customer:</span> <span id="odCustomer">-</span></div>
                            <div><span class="order-detail-label">Phone:</span> <span id="odPhone">-</span></div>
                            <div><span class="order-detail-label">Address:</span> <span id="odAddress">-</span></div>
                        </div>

                        <div class="col-md-6 text-md-end">
                            <div><span class="order-detail-label">Order #:</span> <span id="odInvoice">-</span></div>
                            <div><span class="order-detail-label">Date:</span> <span id="odDate">-</span></div>
                            <div class="mt-1">
                                <span class="order-detail-label">Payment:</span>
                                <span class="badge text-bg-primary" id="odPayment">-</span>
                            </div>
                            <div class="mt-1">
                                <span class="order-detail-label">Status:</span>
                                <span class="badge text-bg-success" id="odStatus">-</span>
                            </div>
                        </div>
                    </div>

                    <h6 class="mb-2">Order Items</h6>
                    <div class="table-responsive">
                        <table class="table">
                            <thead class="table-light">
                            <tr>
                                <th>Product</th>
                                <th class="text-center">Qty</th>
                                <th class="text-end">Price</th>
                                <th class="text-end">Amount</th>
                            </tr>
                            </thead>
                            <tbody id="odItems"></tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-end">
                        <table class="table w-auto">
                            <tr>
                                <td class="text-end"><b>Subtotal:</b></td>
                                <td class="text-end">$<span id="odSubtotal">0.00</span></td>
                            </tr>
                            <tr>
                                <td class="text-end"><b>Discount:</b></td>
                                <td class="text-end text-danger">-$<span id="odDiscount">0.00</span></td>
                            </tr>
                            <tr class="table-primary">
                                <td class="text-end"><b>Grand Total:</b></td>
                                <td class="text-end"><b>$<span id="odTotal">0.00</span></b></td>
                            </tr>
                        </table>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-dark" id="btnAdminDownloadInvoice">Download Invoice</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <script th:src="@{/js/admin/orders.js}"></script>
</div>
</body>
</html>
