spring.application.name=perfume-shop
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/perfume_shop1?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12341234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# upload folder (? correct)
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false


# ===============================
# BAKONG MERCHANT CONFIG
# ===============================
bakong.merchant.accountId=bankong_app@bkrt
bakong.merchant.name=PERFUME SHOP
bakong.merchant.city=PHNOM PENH
bakong.merchant.currency=USD

# ===============================
# BAKONG API CONFIG
# ===============================
bakong.api.token=${BAKONG_TOKEN:YourAPIBakong}
bakong.api.baseUrl=https://api-bakong.nbc.gov.kh

# Google OAuth2 (create in Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

#mail server
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremail@gmail.com
spring.mail.password=Your Password Google Account
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#time
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#telegram bot
telegram.bot.token=Token Telegram
telegram.chat_id=chatId
telegram.channel-id=-channelId
telegram.bot.enabled=true

# Session timeout auto logout
server.servlet.session.timeout=15m